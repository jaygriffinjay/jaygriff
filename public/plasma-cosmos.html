<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plasma Cosmos — Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #e0e6ed;
            --light: #0f1923;
            --mid-gray: #7a8fa3;
            --light-gray: #1e2d3d;
            --accent: hsl(210, 100%, 60%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background: #0a1018; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a1018 0%, var(--light) 100%);
            min-height: 100vh;
            color: var(--dark);
        }
        .container { display: flex; height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 300px; flex-shrink: 0;
            background: rgba(15,25,35,0.92);
            backdrop-filter: blur(12px);
            padding: 24px; border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            overflow-y: auto; overflow-x: hidden;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 22px; font-weight: 500; margin-bottom: 6px; }
        .subtitle { color: var(--mid-gray); font-size: 13px; margin-bottom: 28px; line-height: 1.5; }
        .control-section { margin-bottom: 24px; }
        .control-section h3 {
            font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
            margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
        }
        .control-section h3::before { content: '•'; color: var(--accent); font-size: 16px; }
        .seed-input {
            width: 100%; background: var(--light); padding: 10px 12px;
            border-radius: 8px; font-family: 'Courier New', monospace; font-size: 13px;
            margin-bottom: 10px; border: 1px solid var(--light-gray); text-align: center;
            color: var(--dark);
        }
        .seed-input:focus { outline: none; border-color: var(--accent); }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 7px; }
        .control-group { margin-bottom: 16px; }
        .control-group label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 6px; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        .slider-container input[type="range"] {
            flex: 1; height: 4px; background: var(--light-gray);
            border-radius: 2px; outline: none; -webkit-appearance: none; appearance: none; cursor: pointer;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 14px; height: 14px;
            background: var(--accent); border-radius: 50%; cursor: pointer;
        }
        .slider-container input[type="range"]::-moz-range-thumb {
            width: 14px; height: 14px; background: var(--accent); border-radius: 50%; border: none;
        }
        .value-display { font-family: 'Courier New', monospace; font-size: 11px; color: var(--mid-gray); min-width: 44px; text-align: right; }
        .color-group { margin-bottom: 12px; }
        .color-group label { display: block; font-size: 12px; color: var(--mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 28px; height: 28px; border: none; border-radius: 6px; cursor: pointer; padding: 0; background: none; }
        .color-value { font-family: 'Courier New', monospace; font-size: 11px; color: var(--mid-gray); }
        .hue-slider { width: 100%; height: 8px; outline: none; -webkit-appearance: none; appearance: none; cursor: pointer; background: transparent; margin: 6px 0; }
        .hue-slider::-webkit-slider-runnable-track { height: 8px; border-radius: 4px;
            background: linear-gradient(to right,
                hsl(0,85%,55%), hsl(30,85%,55%), hsl(60,85%,55%), hsl(90,85%,55%),
                hsl(120,85%,55%), hsl(150,85%,55%), hsl(180,85%,55%), hsl(210,85%,55%),
                hsl(240,85%,55%), hsl(270,85%,55%), hsl(300,85%,55%), hsl(330,85%,55%), hsl(360,85%,55%));
        }
        .hue-slider::-moz-range-track { height: 8px; border-radius: 4px; border: none;
            background: linear-gradient(to right,
                hsl(0,85%,55%), hsl(30,85%,55%), hsl(60,85%,55%), hsl(90,85%,55%),
                hsl(120,85%,55%), hsl(150,85%,55%), hsl(180,85%,55%), hsl(210,85%,55%),
                hsl(240,85%,55%), hsl(270,85%,55%), hsl(300,85%,55%), hsl(330,85%,55%), hsl(360,85%,55%));
        }
        .hue-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; background: #e0e6ed; border-radius: 50%; cursor: pointer; border: 2px solid rgba(0,0,0,0.4); margin-top: -4px; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
        .hue-slider::-moz-range-thumb { width: 16px; height: 16px; background: #e0e6ed; border-radius: 50%; border: 2px solid rgba(0,0,0,0.4); cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 7px; }
        button {
            padding: 9px 12px; border: none; border-radius: 8px; cursor: pointer;
            font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 500;
            transition: all 0.15s; background: var(--light-gray); color: var(--dark);
            width: 100%;
        }
        button:hover { background: var(--accent); color: white; transform: translateY(-1px); }
        button.primary { background: var(--accent); color: white; }
        button.primary:hover { background: hsl(210, 100%, 50%); }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #canvas-container canvas { border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); display: block; max-width: 100%; max-height: calc(100vh - 40px); -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        .loading { color: var(--mid-gray); font-size: 14px; }
        hr { border: none; border-top: 1px solid var(--light-gray); margin-bottom: 20px; }
        .back-link {
            position: fixed; top: 14px; right: 18px; z-index: 100;
            font-size: 12px; font-weight: 500; color: var(--mid-gray);
            text-decoration: none; background: rgba(15,25,35,0.85);
            backdrop-filter: blur(8px); padding: 6px 12px;
            border-radius: 8px; border: 1px solid var(--light-gray);
            transition: color 0.15s, border-color 0.15s;
        }
        .back-link:hover { color: var(--accent); border-color: var(--accent); }

        /* Fullscreen mode */
        body.fullscreen { overflow: hidden; }
        body.fullscreen .container { padding: 0; gap: 0; }
        body.fullscreen .sidebar { display: none; }
        body.fullscreen .back-link { display: none; }
        body.fullscreen .canvas-area {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 200;
            background: #0a1018; display: block;
        }
        body.fullscreen #canvas-container { width: 100vw; height: 100vh; display: block; }
        body.fullscreen #canvas-container canvas {
            border-radius: 0; box-shadow: none; width: 100vw !important; height: 100vh !important;
            max-width: none; max-height: none; display: block;
        }
        .fullscreen-exit {
            display: none; position: fixed; top: 14px; right: 18px; z-index: 300;
            font-size: 12px; font-weight: 500; color: var(--mid-gray);
            background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
            padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer; transition: color 0.15s, border-color 0.15s, opacity 0.3s;
            font-family: 'Poppins', sans-serif;
            opacity: 0; pointer-events: none;
        }
        .fullscreen-exit:hover { color: white; border-color: white; }
        body.fullscreen .fullscreen-exit { display: block; }
        body.fullscreen.show-exit .fullscreen-exit { opacity: 1; pointer-events: auto; }

        @media (max-width: 768px) {
            body.fullscreen .fullscreen-exit {
                top: env(safe-area-inset-top, 10px);
                right: auto;
                left: 50%;
                transform: translateX(-50%);
            }
        }

        /* Mobile layout */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                padding: 12px;
                gap: 12px;
            }
            .sidebar {
                width: 100%;
                order: 2;
                max-height: none;
                overflow-y: visible;
            }
            .canvas-area {
                order: 1;
                min-height: 50vw;
                max-height: 60vh;
            }
            #canvas-container canvas {
                max-height: 60vh;
                max-width: 100%;
            }
            .back-link {
                position: static;
                display: block;
                text-align: center;
                margin-bottom: 8px;
                order: 0;
            }
        }
    </style>
</head>
<body>
<a href="/" class="back-link">← jaygriff.com</a>
<button class="fullscreen-exit" onclick="toggleFullscreen()">✕ Exit Fullscreen</button>
<div class="container">
    <div class="sidebar">
        <h1>Plasma Cosmos</h1>
        <p class="subtitle">Luminous plasma tendrils weaving through deep space — interference patterns from invisible stellar forces.</p>

        <div class="control-section">
            <h3>Actions</h3>
            <button onclick="toggleFullscreen()" style="margin-bottom:7px">⛶ Fullscreen</button>
            <div class="btn-row">
                <button onclick="initializeSystem()">⟳ Regen</button>
                <button onclick="resetParameters()">Reset</button>
            </div>
            <button class="primary" onclick="downloadCanvas()" style="margin-top:7px">⬇ Download PNG</button>
        </div>

        <hr>

        <div class="control-section">
            <h3>Seed</h3>
            <input type="number" id="seed-input" class="seed-input" value="42069" min="1">
            <div class="seed-controls">
                <button onclick="previousSeed()">← Prev</button>
                <button onclick="nextSeed()">Next →</button>
            </div>
            <button onclick="randomSeedAndUpdate()" style="margin-bottom:0">🎲 Random</button>
        </div>

        <hr>

        <div class="control-section">
            <h3>Colors</h3>
            <div class="control-group">
                <label>Plasma Core</label>
                <div class="slider-container">
                    <input type="range" class="hue-slider" id="hue1" min="0" max="360" step="1" value="230" oninput="updateHue(0,+this.value)">
                </div>
            </div>
            <div class="control-group">
                <label>Nebula Mid</label>
                <div class="slider-container">
                    <input type="range" class="hue-slider" id="hue2" min="0" max="360" step="1" value="210" oninput="updateHue(1,+this.value)">
                </div>
            </div>
            <div class="control-group">
                <label>Void Edge</label>
                <div class="slider-container">
                    <input type="range" class="hue-slider" id="hue3" min="0" max="360" step="1" value="195" oninput="updateHue(2,+this.value)">
                </div>
            </div>
        </div>

        <hr>

        <div class="control-section">
            <h3>Parameters</h3>
            <div class="control-group">
                <label>Particle Count</label>
                <div class="slider-container">
                    <input type="range" id="particleCount" min="500" max="8000" step="100" value="3500" oninput="updateParam('particleCount',+this.value)">
                    <span class="value-display" id="particleCount-value">3500</span>
                </div>
            </div>
            <div class="control-group">
                <label>Plasma Turbulence</label>
                <div class="slider-container">
                    <input type="range" id="turbulence" min="0.5" max="5.0" step="0.1" value="2.0" oninput="updateParam('turbulence',+this.value)">
                    <span class="value-display" id="turbulence-value">2.0</span>
                </div>
            </div>
            <div class="control-group">
                <label>Field Scale</label>
                <div class="slider-container">
                    <input type="range" id="fieldScale" min="0.001" max="0.012" step="0.001" value="0.004" oninput="updateParam('fieldScale',+this.value)">
                    <span class="value-display" id="fieldScale-value">0.004</span>
                </div>
            </div>
            <div class="control-group">
                <label>Trail Fade</label>
                <div class="slider-container">
                    <input type="range" id="trailFade" min="2" max="25" step="1" value="8" oninput="updateParam('trailFade',+this.value)">
                    <span class="value-display" id="trailFade-value">8</span>
                </div>
            </div>
            <div class="control-group">
                <label>Speed</label>
                <div class="slider-container">
                    <input type="range" id="speed" min="0.3" max="3.0" step="0.1" value="1.2" oninput="updateParam('speed',+this.value)">
                    <span class="value-display" id="speed-value">1.2</span>
                </div>
            </div>
            <div class="control-group">
                <label>Vortex Strength</label>
                <div class="slider-container">
                    <input type="range" id="vortex" min="0" max="2.0" step="0.05" value="0.6" oninput="updateParam('vortex',+this.value)">
                    <span class="value-display" id="vortex-value">0.6</span>
                </div>
            </div>
        </div>
    </div>

    <div class="canvas-area">
        <div id="canvas-container">
            <div class="loading">Igniting plasma fields...</div>
        </div>
    </div>
</div>

<script>
let params = {
    seed: 42069,
    particleCount: 3500,
    turbulence: 2.0,
    fieldScale: 0.004,
    trailFade: 8,
    speed: 1.2,
    vortex: 0.6,
    colors: ['#2b4de6', '#1a7de6', '#14b0e0']
};
let defaultParams = JSON.parse(JSON.stringify(params));
let particles = [];
let t = 0;
let myP5;

function hexToRgb(hex) {
    return {
        r: parseInt(hex.slice(1,3),16),
        g: parseInt(hex.slice(3,5),16),
        b: parseInt(hex.slice(5,7),16)
    };
}
function lerpColor(c1, c2, amt) {
    return {
        r: Math.floor(c1.r + (c2.r - c1.r) * amt),
        g: Math.floor(c1.g + (c2.g - c1.g) * amt),
        b: Math.floor(c1.b + (c2.b - c1.b) * amt)
    };
}

class Particle {
    constructor(p) {
        this.p = p;
        this.reset();
    }
    reset() {
        let p = this.p;
        this.x = p.random(p.width);
        this.y = p.random(p.height);
        this.prevX = this.x;
        this.prevY = this.y;
        this.maxLife = p.random(80, 220);
        this.life = p.random(this.maxLife);
        this.spd = params.speed * p.random(0.6, 1.4);
        this.colorT = p.random(1);
        this.thickness = p.random(0.4, 1.4);
    }
    update(p) {
        let nx = this.x * params.fieldScale;
        let ny = this.y * params.fieldScale;
        let angle = p.noise(nx, ny, t * 0.0015) * p.TWO_PI * params.turbulence;
        angle += p.noise(nx * 2.7 + 100, ny * 2.7 - 50, t * 0.003 + 99) * p.TWO_PI * 0.6;
        if (params.vortex > 0) {
            let dx = this.x - p.width/2, dy = this.y - p.height/2;
            let dist = Math.sqrt(dx*dx + dy*dy) + 1;
            let curl = Math.atan2(dy, dx) + p.HALF_PI;
            angle += curl * (params.vortex * 200) / dist * 0.002;
        }
        this.prevX = this.x;
        this.prevY = this.y;
        this.x += Math.cos(angle) * this.spd;
        this.y += Math.sin(angle) * this.spd;
        this.life--;
        if (this.life <= 0 || this.x < -5 || this.x > p.width+5 || this.y < -5 || this.y > p.height+5) {
            this.reset();
        }
    }
    draw(p) {
        let lf = this.life / this.maxLife;
        let alpha = lf < 0.15 ? (lf/0.15)*180 : lf > 0.85 ? ((1-lf)/0.15)*180 : 180;
        let c1 = hexToRgb(params.colors[0]);
        let c2 = hexToRgb(params.colors[1]);
        let c3 = hexToRgb(params.colors[2]);
        let col = this.colorT < 0.5 ? lerpColor(c1, c2, this.colorT*2) : lerpColor(c2, c3, (this.colorT-0.5)*2);
        p.stroke(col.r, col.g, col.b, alpha);
        p.strokeWeight(this.thickness);
        p.line(this.prevX, this.prevY, this.x, this.y);
    }
}

new p5(function(p) {
    myP5 = p;
    p.setup = function() {
        let container = document.getElementById('canvas-container');
        let size = Math.min(container.clientWidth, container.clientHeight);
        if (size < 100) size = Math.min(window.innerWidth - 40, window.innerHeight * 0.6);
        let canvas = p.createCanvas(size, size);
        canvas.parent('canvas-container');
        document.querySelector('.loading').style.display = 'none';
        initializeSystem();
    };
    p.windowResized = function() {
        let container = document.getElementById('canvas-container');
        let size = Math.min(container.clientWidth, container.clientHeight);
        if (size < 100) size = Math.min(window.innerWidth - 40, window.innerHeight * 0.6);
        // Only resize if the change is significant (ignore iOS address bar)
        if (Math.abs(size - p.width) > 50) {
            p.resizeCanvas(size, size);
            initializeSystem();
        }
    };
    p.draw = function() {
        p.noStroke();
        p.fill(8, 6, 18, params.trailFade);
        p.rect(0, 0, p.width, p.height);
        for (let pt of particles) {
            pt.update(p);
            pt.draw(p);
        }
        t++;
    };
});

function initializeSystem() {
    if (!myP5) return;
    myP5.randomSeed(params.seed);
    myP5.noiseSeed(params.seed);
    t = 0;
    particles = [];
    for (let i = 0; i < params.particleCount; i++) {
        particles.push(new Particle(myP5));
    }
    myP5.background(8, 6, 18);
}

function updateParam(name, value) {
    params[name] = value;
    document.getElementById(name + '-value').textContent = value;
    if (name === 'particleCount') {
        myP5.randomSeed(params.seed);
        myP5.noiseSeed(params.seed);
        particles = [];
        for (let i = 0; i < params.particleCount; i++) particles.push(new Particle(myP5));
    }
}

function updateColor(idx, value) {
    params.colors[idx] = value;
}

function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    let c = (1 - Math.abs(2 * l - 1)) * s;
    let x = c * (1 - Math.abs((h / 60) % 2 - 1));
    let m = l - c / 2;
    let r, g, b;
    if (h < 60) { r=c; g=x; b=0; }
    else if (h < 120) { r=x; g=c; b=0; }
    else if (h < 180) { r=0; g=c; b=x; }
    else if (h < 240) { r=0; g=x; b=c; }
    else if (h < 300) { r=x; g=0; b=c; }
    else { r=c; g=0; b=x; }
    r = Math.round((r+m)*255).toString(16).padStart(2,'0');
    g = Math.round((g+m)*255).toString(16).padStart(2,'0');
    b = Math.round((b+m)*255).toString(16).padStart(2,'0');
    return '#' + r + g + b;
}

function updateHue(idx, hue) {
    params.colors[idx] = hslToHex(hue, 85, 55);
}

function hexToHsl(hex) {
    let r = parseInt(hex.slice(1,3),16)/255;
    let g = parseInt(hex.slice(3,5),16)/255;
    let b = parseInt(hex.slice(5,7),16)/255;
    let max = Math.max(r,g,b), min = Math.min(r,g,b);
    let h, s, l = (max+min)/2;
    if (max === min) { h = s = 0; }
    else {
        let d = max - min;
        s = l > 0.5 ? d/(2-max-min) : d/(max+min);
        if (max===r) h = ((g-b)/d + (g<b?6:0))/6;
        else if (max===g) h = ((b-r)/d+2)/6;
        else h = ((r-g)/d+4)/6;
    }
    return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}


function updateSeedDisplay() { document.getElementById('seed-input').value = params.seed; }
function updateSeed() {
    let v = parseInt(document.getElementById('seed-input').value);
    if (v > 0) { params.seed = v; initializeSystem(); } else updateSeedDisplay();
}
function previousSeed() { params.seed = Math.max(1, params.seed-1); updateSeedDisplay(); initializeSystem(); }
function nextSeed() { params.seed++; updateSeedDisplay(); initializeSystem(); }
function randomSeedAndUpdate() { params.seed = Math.floor(Math.random()*999999)+1; updateSeedDisplay(); initializeSystem(); }

function resetParameters() {
    params = JSON.parse(JSON.stringify(defaultParams));
    ['particleCount','turbulence','fieldScale','trailFade','speed','vortex'].forEach(k => {
        document.getElementById(k).value = params[k];
        document.getElementById(k+'-value').textContent = params[k];
    });
    params.colors.forEach((c,i) => {
        let [h] = hexToHsl(c);
        document.getElementById('hue'+(i+1)).value = h;
    });
    updateSeedDisplay();
    initializeSystem();
}

function downloadCanvas() {
    let canvas = document.querySelector('#canvas-container canvas');
    if (!canvas) { alert('Canvas not found.'); return; }
    try {
        canvas.toBlob(function(blob) {
            if (!blob) { alert('Could not capture canvas. Try right-clicking the canvas and saving directly.'); return; }
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'plasma-cosmos-seed' + params.seed + '.png';
            document.body.appendChild(a);
            a.click();
            setTimeout(function() {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 2000);
        }, 'image/png');
    } catch(e) {
        alert('Download unavailable in this environment. Right-click the canvas and choose "Save image as..." to save manually.');
    }
}

document.getElementById('seed-input').addEventListener('change', updateSeed);
window.addEventListener('load', updateSeedDisplay);

function toggleFullscreen() {
    let isFullscreen = document.body.classList.toggle('fullscreen');
    if (myP5) {
        setTimeout(function() {
            let w, h;
            if (isFullscreen) {
                w = window.innerWidth;
                h = window.innerHeight;
            } else {
                let container = document.getElementById('canvas-container');
                let size = Math.min(container.clientWidth, container.clientHeight);
                if (size < 100) size = Math.min(window.innerWidth - 40, window.innerHeight * 0.6);
                w = size;
                h = size;
            }
            myP5.resizeCanvas(w, h);
            initializeSystem();
        }, 50);
    }
}

let exitTimeout;
document.addEventListener('mousemove', function() {
    if (!document.body.classList.contains('fullscreen')) return;
    document.body.classList.add('show-exit');
    clearTimeout(exitTimeout);
    exitTimeout = setTimeout(function() {
        document.body.classList.remove('show-exit');
    }, 2000);
});

// On mobile, show exit button on touch anywhere
document.addEventListener('touchstart', function() {
    if (!document.body.classList.contains('fullscreen')) return;
    document.body.classList.add('show-exit');
    clearTimeout(exitTimeout);
    exitTimeout = setTimeout(function() {
        document.body.classList.remove('show-exit');
    }, 3000);
}, { passive: true, capture: true });
</script>
